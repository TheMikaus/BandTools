name: Build PolyRhythmMetronome APK

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Buildozer command"
        type: choice
        required: true
        default: android debug
        options: [android debug, android release, android release aab]
      spec_path:
        description: "Path to buildozer.spec"
        type: string
        required: true
        default: ./PolyRhythmMetronome/android/buildozer.spec
      clean:
        description: "Clean before build?"
        type: boolean
        default: false
      create_release:
        description: "Create a GitHub Release after build?"
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Make sure the dirs exist and are writable
      - name: Prep cache dirs
        run: |
          mkdir -p "${HOME}/.buildozer" ".buildozer" "PolyRhythmMetronome/android/bin"
          chmod -R 777 "${HOME}/.buildozer" ".buildozer" "PolyRhythmMetronome/android/bin"

      - name: Cache global .buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: global-buildozer-${{ runner.os }}-${{ hashFiles(inputs.spec_path) }}

      - name: Cache project .buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: proj-buildozer-${{ runner.os }}-${{ hashFiles(inputs.spec_path) }}

      - name: Optional clean
        if: ${{ fromJson(inputs.clean) }}
        run: |
          rm -rf .buildozer PolyRhythmMetronome/android/bin || true
          mkdir -p .buildozer PolyRhythmMetronome/android/bin
          chmod -R 777 .buildozer PolyRhythmMetronome/android/bin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:   
          api-level: 33 # Or the desired API level
          ndk: 25.2.9519653 # Or the desired NDK version
          build-tools: 33.0.2 # Or the desired build tools version


      - name: Build with Buildozer
        id: buildozer
        uses: n8marti/buildozer-action@fix-user-doesnt-exist
        with:
          workdir: PolyRhythmMetronome/android
          command: ${{ inputs.target }}

      - name: Upload artifacts (APK/AAB)
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            PolyRhythmMetronome/android/bin/*.apk
            PolyRhythmMetronome/android/bin/*.aab
          if-no-files-found: warn

      - name: Clean up old artifacts (keep last 5)
        uses: actions/github-script@v7
        with:
          script: |
            const name = 'android-build';
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const matching = artifacts
              .filter(a => a.name === name)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const toDelete = matching.slice(5);
            let deleted = 0;
            for (const artifact of toDelete) {
              try {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
                console.log(`Deleted artifact: ${artifact.name} (id: ${artifact.id})`);
                deleted++;
              } catch (err) {
                console.warn(`Failed to delete artifact ${artifact.name} (id: ${artifact.id}): ${err.message}`);
              }
            }
            console.log(`Kept ${Math.min(matching.length, 5)} artifact(s), deleted ${deleted}.`);

      - name: Create GitHub Release (optional)
        if: ${{ fromJson(inputs.create_release) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Android build ${{ github.run_number }}
          files: |
            PolyRhythmMetronome/android/bin/*.apk
            PolyRhythmMetronome/android/bin/*.aab
